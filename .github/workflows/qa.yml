name: QA Suite

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * *' # nightly ~1am ET
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Override target (a Vercel preview URL runs the FULL suite incl. writes)'
        required: false

jobs:
  qa:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Run Playwright suite
        run: npx playwright test
        env:
          # Default target is production (read-only; previewOnly tests auto-skip).
          # Trigger the workflow manually with a preview URL to run the full suite.
          QA_TARGET_URL: ${{ github.event.inputs.target_url || vars.QA_TARGET_URL || 'https://clearbedrecovery.com' }}
          E2E_SEEKER_EMAIL: ${{ secrets.E2E_SEEKER_EMAIL }}
          E2E_SEEKER_PASSWORD: ${{ secrets.E2E_SEEKER_PASSWORD }}
          E2E_FACILITY_EMAIL: ${{ secrets.E2E_FACILITY_EMAIL }}
          E2E_FACILITY_PASSWORD: ${{ secrets.E2E_FACILITY_PASSWORD }}
          E2E_PARTNER_EMAIL: ${{ secrets.E2E_PARTNER_EMAIL }}
          E2E_PARTNER_PASSWORD: ${{ secrets.E2E_PARTNER_PASSWORD }}
          E2E_REP_EMAIL: ${{ secrets.E2E_REP_EMAIL }}
          E2E_REP_PASSWORD: ${{ secrets.E2E_REP_PASSWORD }}
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
      - name: Push results to Supabase
        if: always()
        run: node scripts/report-to-supabase.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          QA_TARGET_URL: ${{ github.event.inputs.target_url || vars.QA_TARGET_URL || 'https://clearbedrecovery.com' }}
      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 14
